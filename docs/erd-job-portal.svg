<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Job Portal ERD</title>
  <desc id="desc">Entity relationship diagram for the dbProj job portal database.</desc>
  <defs>
    <style>
      .page { fill: #f8fafc; }
      .entity { fill: #ffffff; stroke: #334155; stroke-width: 1.5; }
      .head { fill: #0f766e; }
      .title { fill: #ffffff; font: 700 16px Arial, sans-serif; }
      .field { fill: #0f172a; font: 13px Arial, sans-serif; }
      .key { fill: #b45309; font: 700 13px Arial, sans-serif; }
      .relation { stroke: #475569; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .label { fill: #334155; font: 12px Arial, sans-serif; }
      .note { fill: #0f172a; font: 14px Arial, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>

  <rect class="page" width="1200" height="900" />
  <text x="40" y="34" class="note" style="font-size: 22px; font-weight: 700;">IT8415 Job Portal ERD</text>
  <text x="40" y="58" class="note">All tables use the required dbProj_ prefix. FULLTEXT search is on dbProj_job_listings(title, description).</text>

  <g id="roles">
    <rect class="entity" x="40" y="90" width="250" height="130" rx="6" />
    <rect class="head" x="40" y="90" width="250" height="32" rx="6" />
    <text class="title" x="54" y="112">dbProj_roles</text>
    <text class="key" x="54" y="145">PK role_id</text>
    <text class="field" x="54" y="168">role_name</text>
    <text class="field" x="54" y="191">role_description</text>
  </g>

  <g id="users">
    <rect class="entity" x="390" y="90" width="280" height="205" rx="6" />
    <rect class="head" x="390" y="90" width="280" height="32" rx="6" />
    <text class="title" x="404" y="112">dbProj_users</text>
    <text class="key" x="404" y="145">PK user_id</text>
    <text class="key" x="404" y="168">FK role_id</text>
    <text class="field" x="404" y="191">full_name</text>
    <text class="field" x="404" y="214">email unique</text>
    <text class="field" x="404" y="237">password_hash</text>
    <text class="field" x="404" y="260">is_active</text>
  </g>

  <g id="employers">
    <rect class="entity" x="830" y="90" width="300" height="160" rx="6" />
    <rect class="head" x="830" y="90" width="300" height="32" rx="6" />
    <text class="title" x="844" y="112">dbProj_employers</text>
    <text class="key" x="844" y="145">PK employer_id</text>
    <text class="key" x="844" y="168">FK owner_user_id</text>
    <text class="field" x="844" y="191">company_name unique</text>
    <text class="field" x="844" y="214">company_website</text>
  </g>

  <g id="categories">
    <rect class="entity" x="40" y="360" width="300" height="150" rx="6" />
    <rect class="head" x="40" y="360" width="300" height="32" rx="6" />
    <text class="title" x="54" y="382">dbProj_job_categories</text>
    <text class="key" x="54" y="415">PK category_id</text>
    <text class="field" x="54" y="438">category_name unique</text>
    <text class="field" x="54" y="461">category_slug unique</text>
    <text class="field" x="54" y="484">category_description</text>
  </g>

  <g id="jobs">
    <rect class="entity" x="430" y="330" width="350" height="300" rx="6" />
    <rect class="head" x="430" y="330" width="350" height="32" rx="6" />
    <text class="title" x="444" y="352">dbProj_job_listings</text>
    <text class="key" x="444" y="385">PK job_id</text>
    <text class="key" x="444" y="408">FK employer_id</text>
    <text class="key" x="444" y="431">FK category_id</text>
    <text class="key" x="444" y="454">FK created_by_user_id</text>
    <text class="field" x="444" y="477">title</text>
    <text class="field" x="444" y="500">short_description</text>
    <text class="field" x="444" y="523">description</text>
    <text class="field" x="444" y="546">employment_type, work_mode</text>
    <text class="field" x="444" y="569">salary range, status</text>
    <text class="field" x="444" y="592">published_at</text>
  </g>

  <g id="media">
    <rect class="entity" x="860" y="330" width="280" height="140" rx="6" />
    <rect class="head" x="860" y="330" width="280" height="32" rx="6" />
    <text class="title" x="874" y="352">dbProj_job_media</text>
    <text class="key" x="874" y="385">PK media_id</text>
    <text class="key" x="874" y="408">FK job_id</text>
    <text class="field" x="874" y="431">media_type</text>
    <text class="field" x="874" y="454">file_path, is_primary</text>
  </g>

  <g id="comments">
    <rect class="entity" x="40" y="665" width="300" height="170" rx="6" />
    <rect class="head" x="40" y="665" width="300" height="32" rx="6" />
    <text class="title" x="54" y="687">dbProj_comments</text>
    <text class="key" x="54" y="720">PK comment_id</text>
    <text class="key" x="54" y="743">FK job_id</text>
    <text class="key" x="54" y="766">FK user_id</text>
    <text class="key" x="54" y="789">FK removed_by_user_id</text>
    <text class="field" x="54" y="812">comment_text, is_removed</text>
  </g>

  <g id="ratings">
    <rect class="entity" x="450" y="690" width="280" height="135" rx="6" />
    <rect class="head" x="450" y="690" width="280" height="32" rx="6" />
    <text class="title" x="464" y="712">dbProj_ratings</text>
    <text class="key" x="464" y="745">PK rating_id</text>
    <text class="key" x="464" y="768">FK job_id</text>
    <text class="key" x="464" y="791">FK user_id</text>
    <text class="field" x="464" y="814">rating_value 1 to 5</text>
  </g>

  <g id="views">
    <rect class="entity" x="850" y="675" width="280" height="135" rx="6" />
    <rect class="head" x="850" y="675" width="280" height="32" rx="6" />
    <text class="title" x="864" y="697">dbProj_job_views</text>
    <text class="key" x="864" y="730">PK view_id</text>
    <text class="key" x="864" y="753">FK job_id</text>
    <text class="key" x="864" y="776">FK viewer_user_id</text>
    <text class="field" x="864" y="799">viewer_ip, viewed_at</text>
  </g>

  <path class="relation" d="M290 155 C330 155, 350 155, 390 155" />
  <text class="label" x="318" y="146">1 to many</text>

  <path class="relation" d="M670 168 C730 168, 770 168, 830 168" />
  <text class="label" x="716" y="158">owner</text>

  <path class="relation" d="M980 250 C980 300, 780 300, 730 330" />
  <text class="label" x="862" y="294">posts</text>

  <path class="relation" d="M530 295 C530 312, 530 318, 530 330" />
  <text class="label" x="542" y="318">creates</text>

  <path class="relation" d="M340 435 C380 435, 390 435, 430 435" />
  <text class="label" x="360" y="426">groups</text>

  <path class="relation" d="M780 400 C810 400, 830 400, 860 400" />
  <text class="label" x="800" y="391">has</text>

  <path class="relation" d="M505 630 C440 665, 405 712, 340 742" />
  <text class="label" x="382" y="686">comments</text>

  <path class="relation" d="M590 630 C590 655, 590 665, 590 690" />
  <text class="label" x="602" y="666">ratings</text>

  <path class="relation" d="M705 630 C760 665, 800 715, 850 742" />
  <text class="label" x="766" y="686">views</text>

  <path class="relation" d="M435 295 C300 430, 260 570, 200 665" />
  <text class="label" x="278" y="558">writes / moderates</text>

  <path class="relation" d="M560 295 C490 420, 440 570, 520 690" />
  <text class="label" x="472" y="622">gives</text>

  <path class="relation" d="M640 295 C790 430, 900 560, 970 675" />
  <text class="label" x="856" y="602">views</text>
</svg>
